<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body class="bg-[#1C1C1E] min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-md mx-auto bg-gray-800/50 rounded-3xl backdrop-blur-xl p-8 shadow-xl border border-gray-700/50">
            <h1 class="text-3xl font-bold text-white text-center mb-6">Login</h1>
            <form method="POST">
                <div class="space-y-4">
                    <input type="email" name="email" placeholder="Email" 
                           class="w-full bg-gray-700/50 text-white px-4 py-3 rounded-xl">
                    <input type="password" name="password" placeholder="Password" 
                           class="w-full bg-gray-700/50 text-white px-4 py-3 rounded-xl">
                    <button type="submit" 
                            class="w-full bg-[#0A84FF] hover:bg-[#409CFF] text-white font-medium py-3 rounded-xl">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
